name: Python Environment Check

# mainブランチにPushされたときに実行する
on:
  push:
    branches: [ "main" ]

jobs:
  build:
    runs-on: ubuntu-latest

    steps:
    # 1. GitHub上のコードをサーバーに持ってくる
    - uses: actions/checkout@v4

    # 2. Pythonの環境をセットアップする
    - name: Set up Python 3.8
      uses: actions/setup-python@v5
      with:
        python-version: "3.8"

    # 3. 依存ライブラリがインストールできるかテストする
    - name: Install dependencies
      run: |
        python -m pip install --upgrade pip
        pip install setuptools wheel
        pip install wandb icecream setproctitle gym seaborn tensorboardX slackweb psutil einops